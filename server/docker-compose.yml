version: "3.9"

# Remote mode: run this on your VPS/server
# Local mode: use docker-compose.local.yml instead

services:
  noteward:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"   # Bind to localhost only — use reverse proxy for HTTPS
    volumes:
      - noteward_data:/app/data  # Encrypted secrets + synced notes stored here
    environment:
      - NOTEWARD_CONFIG=/app/data/config.yml
    tmpfs:
      - /dev/shm                 # RAM-only key storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  noteward_data:
